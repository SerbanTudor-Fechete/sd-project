<main class="auth-wrapper" aria-labelledby="reset-title">
  <mat-card class="auth-card elevation-z8">
    
    <div class="auth-header">
      <h2 id="reset-title" class="title">Reset Password</h2>
      
      @if (step() === 1) {
        <p class="subtitle">Enter your email to receive a verification code.</p>
      } @else {
        <p class="subtitle success-text">Code sent! Check your inbox.</p>
      }
    </div>

    <mat-card-content>
      @if (errorMessage()) {
        <div class="error-banner" role="alert" aria-live="assertive">
          {{ errorMessage() }}
        </div>
      }

      @if (step() === 1) {
        <div class="auth-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput type="email" [(ngModel)]="email" placeholder="name@example.com" />
          </mat-form-field>

          <button mat-flat-button color="primary" class="submit-btn" (click)="sendCode()" [disabled]="!email">
            Send Reset Code
          </button>
        </div>
      }

      @if (step() === 2) {
        <div class="auth-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Verification Code</mat-label>
            <input matInput type="text" [(ngModel)]="code" placeholder="6-digit code" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>New Password</mat-label>
            <input matInput type="password" [(ngModel)]="newPassword" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Confirm Password</mat-label>
            <input matInput type="password" [(ngModel)]="confirmPassword" />
          </mat-form-field>

          <button mat-flat-button color="accent" class="submit-btn" (click)="resetPassword()" [disabled]="!code || !newPassword || !confirmPassword">
            Reset Password
          </button>
        </div>
      }

      <div class="footer-link">
        <a routerLink="/login">Back to Login</a>
      </div>

    </mat-card-content>
  </mat-card>
</main>
